version: '3.8'

services:
  chat-ioc-service:
    build:
      context: ./chat-ioc-service
      dockerfile: Dockerfile
    container_name: chat-ioc-backend
    ports:
      - "8080:8080"
    environment:
      - JAVA_OPTS=-Xmx512m -Xms256m
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - chat-network

  chat-ioc-frontend:
    build:
      context: ./chat-ioc-frontend
      dockerfile: Dockerfile
    container_name: chat-ioc-frontend
    ports:
      - "80:80"
    depends_on:
      chat-ioc-service:
        condition: service_healthy
    networks:
      - chat-network

networks:
  chat-network:
    driver: bridge