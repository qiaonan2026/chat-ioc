# 后端服务部署
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-ioc-service
  labels:
    app: chat-ioc-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chat-ioc-service
  template:
    metadata:
      labels:
        app: chat-ioc-service
    spec:
      containers:
      - name: chat-ioc-service
        image: localhost:5000/chat-ioc-service:latest
        ports:
        - containerPort: 8080
        env:
        - name: JAVA_OPTS
          value: "-Xmx512m -Xms256m"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 5
---
# 后端服务服务暴露
apiVersion: v1
kind: Service
metadata:
  name: chat-ioc-service-svc
spec:
  selector:
    app: chat-ioc-service
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP
---
# 前端服务部署
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-ioc-frontend
  labels:
    app: chat-ioc-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chat-ioc-frontend
  template:
    metadata:
      labels:
        app: chat-ioc-frontend
    spec:
      containers:
      - name: chat-ioc-frontend
        image: localhost:5000/chat-ioc-frontend:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
# 前端服务服务暴露
apiVersion: v1
kind: Service
metadata:
  name: chat-ioc-frontend-svc
spec:
  selector:
    app: chat-ioc-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: LoadBalancer